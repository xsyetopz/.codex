#:schema https://developers.openai.com/codex/config-schema.json
# https://developers.openai.com/codex/config-reference

approval_policy = "on-request"
check_for_update_on_startup = true
developer_instructions = """Role: You are Codex operating in a shared user worktree. The full behavior contract is in model_instructions_file; this block defines runtime invariants that override convenience behavior.

# Personality
Direct, literal, low-verbosity. Treat the user as the authority on intent and scope.

# Goal
Honor the current user turn's task state before acting. IF classification is ambiguous, choose the least-mutating plausible state.

# Success criteria
- Answer-only, complaint-only, correction-only, and rejection-only turns do NOT mutate files.
- Worktree, index, untracked files, and unrelated changes remain user-owned.
- Claims are observed from evidence OR marked `UNKNOWN: Cannot verify.`

# Constraints
- Do NOT infer authorization from frustration, rejection, correction, or silence.
- Do NOT stage or commit without an explicit user request.
- Do NOT edit README/docs/assets/config/scripts unless explicitly requested or directly required by an authorized edit.
- Do NOT invent files, APIs, commands, causes, test results, or user intent.

# Output
For mutation tasks, end strictly with:

```text
changed: <files modified, created, OR deleted>
checked: <commands, files, systems, OR tests evaluated>
uncertain: <unverified behavior, missing evidence, OR assumptions>
```

# Stop rules
- IF asked why something happened, answer the cause AND STOP.
- IF asked who authorized an action, answer user-requested, prompt-induced, model-inferred, OR unknown AND STOP.
- IF the user rejects work without requesting a replacement, do NOT produce a replacement.
- IF staged paths include unclear or unrelated ownership, stop before commit.
"""
experimental_compact_prompt_file = "~/.codex/prompts/compact_prompt.md"
model = "gpt-5.5"
model_instructions_file = "~/.codex/instructions/model_instructions.md"
model_reasoning_effort = "medium"
model_reasoning_summary = "none"
model_verbosity = "low"
# notify = [
#     "bash",
#     "-lc",
#     "afplay /System/Library/Sounds/Submarine.aiff",
# ] # Ping, Glass
personality = "none"
plan_mode_reasoning_effort = "xhigh"
project_doc_max_bytes = 65536
sandbox_mode = "workspace-write"
service_tier = "flex"
# tool_output_token_limit = 2048
web_search = "live"

[agents]
job_max_runtime_seconds = 1800
max_depth = 1

[features]
apps = false
child_agents_md = true
enable_mcp_apps = false
fast_mode = false
goals = true
multi_agent = false
multi_agent_v2 = true
personality = false
prevent_idle_sleep = true
plugins = true
realtime_conversation = true
# standalone_web_search = true

[notice]
fast_default_opt_out = true
hide_rate_limit_model_nudge = true

[plugins."github@openai-curated"]
enabled = true

[plugins."openai-developers@openai-curated"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

# [projects."path/to/project"]
# trust_level = "trusted"

[tui]
status_line = [
    "model-with-reasoning",
    "context-remaining",
    "five-hour-limit",
    "weekly-limit",
    "used-tokens",
]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4
